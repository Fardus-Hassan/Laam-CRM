packages:
  - "apps/*"
  - "packages/*"

autoInstallPeers: true
allowBuilds:
  nx: true
  sharp: true
  "@parcel/watcher": true
  unrs-resolver: true
  less: true
  "@swc/core": true
  esbuild: true
  "@scarf/scarf": true
  '@prisma/client': set this to true or false
  '@prisma/engines': set this to true or false
  prisma: set this to true or false
